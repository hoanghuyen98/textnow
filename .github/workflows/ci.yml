name: CI/CD Docker Pipeline

on:
  push:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: env
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 256mb
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install deps
        run: |
          poetry lock
          poetry install --no-root
      - name: Run Tests
        env:
          PG_DB: test_db
          PG_USERNAME: test_user
          PG_PASSWORD: test_pass
          PG_HOST: localhost
          PG_PORT: 5432
          DEBUG: "False"
          SECRET_KEY: "test-secret-key"
        run: |
          poetry run python manage.py migrate
          poetry run python manage.py test app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit && bandit -r app sideline -ll

  build-and-push:
    needs: [test, security]
    runs-on: ubuntu-latest
    environment: env
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # Build đúng tag v1.0.0 như bạn mong muốn
          tags: 01646083113/sideline-backend:v1.0.0

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            PROJECT_DIR="/root/green_sideline"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            # 1. Kiểm tra và Clone repo
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Folder chưa tồn tại. Đang tiến hành clone..."
              git clone $REPO_URL $PROJECT_DIR
            fi
            
            cd $PROJECT_DIR
            git pull origin main

            # 2. Tự động tạo/cập nhật file .env từ GitHub Secrets
            # Dấu > để ghi mới, >> để viết tiếp vào cuối file
            echo "DEBUG=False" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "PG_DB=${{ secrets.DB_NAME }}" >> .env        # ← đổi thành PG_*
            echo "PG_USERNAME=${{ secrets.DB_USER }}" >> .env
            echo "PG_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "PG_HOST=db" >> .env
            echo "PG_PORT=5432" >> .env
            echo "REDIS_URL=redis://redis:6379/0" >> .env

            # 3. Kéo Image mới nhất và khởi động lại các container
            # Dùng 'docker compose pull' để lấy cả web và worker (nếu có)
            docker compose pull
            docker compose up -d --force-recreate
            
            # 4. Thực hiện các lệnh quản trị Django bên trong container web
            # Thêm -T để chạy lệnh trong môi trường không có terminal (CI/CD)
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --noinput
            
            # 5. Dọn dẹp các Image cũ để tránh đầy ổ cứng server
            docker image prune -f