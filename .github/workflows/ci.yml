name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
      - name: Run Tests
        env:
          DEBUG: "False"
          SECRET_KEY: "test-secret-key"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          poetry run python manage.py migrate
          poetry run python manage.py test app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run Bandit (Security Scan)
        run: |
          pip install bandit
          # Quét bảo mật mức độ Medium trở lên (-ll)
          # Nếu có lỗi, job này sẽ FAIL và chặn deploy
          bandit -r app sideline -ll

  deploy:
    # QUAN TRỌNG: Phải thành công cả test và security mới chạy deploy
    needs: [test, security] 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /path/to/your/project
            git pull origin main
            export PATH="$HOME/.local/bin:$PATH"
            poetry install --only main --no-interaction
            poetry run python manage.py migrate
            poetry run python manage.py collectstatic --noinput
            # sudo systemctl restart gunicorn
            echo "Bảo mật và Test đều đạt! Deploy thành công."