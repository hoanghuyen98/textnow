name: CI/CD Docker Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: env
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 256mb
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install deps
        run: |
          # Thêm lệnh này để đồng bộ lại file lock trước khi cài đặt
          poetry lock --no-update 
          poetry install --no-root
      - name: Run Tests
        env:
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 5432
          DEBUG: "False"
          SECRET_KEY: "test-secret-key"
        run: |
          poetry run python manage.py migrate
          poetry run python manage.py test app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit && bandit -r app sideline -ll

  build-and-push:
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # Build đúng tag v1.0.0 như bạn mong muốn
          tags: 01646083113/sideline-backend:v1.0.0

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            PROJECT_DIR="/root/green_sideline"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            # 1. Kiểm tra nếu thư mục chưa có thì clone về
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Folder chưa tồn tại. Đang tiến hành clone..."
              git clone $REPO_URL $PROJECT_DIR
            fi
            
            # 2. Di chuyển vào thư mục và cập nhật code
            cd $PROJECT_DIR
            git pull origin main
            
            # 3. Triển khai Docker (Lấy image v1.0.0 đã build ở bước trước)
            docker compose pull web
            docker compose up -d
            
            # 4. Chạy các lệnh Django
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --noinput
            
            # 5. Dọn dẹp
            docker image prune -f