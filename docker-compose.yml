version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sideline_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_USER=${PG_USERNAME}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    # ĐÃ BỎ PORTS 5432 để chặn hacker quét cổng DB trực tiếp từ ngoài internet
    restart: always
    networks:
      - sideline_internal

  redis:
    image: redis:7-alpine
    container_name: sideline_redis
    restart: always
    networks:
      - sideline_internal

  web:
    image: 01646083113/sideline-backend:v1.0.0
    container_name: sideline_web
    # ĐÃ BỎ PORTS 8000 vì Traefik sẽ bắn request qua mạng nội bộ, không cần mở cổng ra VPS nữa
    environment:
      - PG_DB=${PG_DB}
      - PG_USERNAME=${PG_USERNAME}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=db
      - PG_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - SELLMMO_KEY=${SELLMMO_KEY}
      - DONGVAN_KEY=${DONGVAN_KEY}
      - MUAVIEW_KEY=${MUAVIEW_KEY}
      - SHOPGMAIL_KEY=${SHOPGMAIL_KEY}
      - GMAIL94_KEY=${GMAIL94_KEY}
      - PROXY_US=${PROXY_US}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - db
      - redis
    restart: always
    # CẤU HÌNH TRAEFIK NHẬN DIỆN DOMAIN TẠI ĐÂY
    labels:
      - "traefik.enable=true"
      
      # 1. Điền domain sideline của bạn vào đây (Hỗ trợ cả bản www nếu cần)
      - "traefik.http.routers.sideline_web_router.rule=Host(`api.sideliine.com`)"
      - "traefik.http.routers.sideline_web_router.entrypoints=websecure"
      - "traefik.http.routers.sideline_web_router.tls=true"
      - "traefik.http.routers.sideline_web_router.tls.certresolver=myresolver" # Dùng chung bộ cấp SSL với Traefik proxy
      
      # 2. Khai báo cổng mà ứng dụng Django bên trong container đang chạy (Cổng 8000)
      - "traefik.http.services.sideline_web_service.loadbalancer.server.port=8000"
    networks:
      - sideline_internal
      - webproxy # Tham gia mạng chung để Traefik tìm thấy

  celery_worker:
    image: 01646083113/sideline-backend:v1.0.0
    container_name: sideline_worker
    command: celery -A sideline worker -l info -P gevent --concurrency 100 --max-tasks-per-child 500
    environment:
      - PG_DB=${PG_DB}
      - PG_USERNAME=${PG_USERNAME}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - SELLMMO_KEY=${SELLMMO_KEY}
      - DONGVAN_KEY=${DONGVAN_KEY}
      - MUAVIEW_KEY=${MUAVIEW_KEY}
      - SHOPGMAIL_KEY=${SHOPGMAIL_KEY}
      - GMAIL94_KEY=${GMAIL94_KEY}
      - PROXY_US=${PROXY_US}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - sideline_internal

  celery_beat:
    image: 01646083113/sideline-backend:v1.0.0
    container_name: sideline_beat
    command: celery -A sideline beat -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PROXY_US=${PROXY_US}
    depends_on:
      - redis
    restart: always
    networks:
      - sideline_internal

volumes:
  postgres_data:

networks:
  sideline_internal:
    internal: true # Mạng cô lập nội bộ bảo mật cho DB và Redis
  webproxy:
    external: true # Kết nối với mạng ngoài chứa Traefik